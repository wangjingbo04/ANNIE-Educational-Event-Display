<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ANNIE Summer Camp Simulator</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/eventDisplay.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <h1>ANNIE Summer Camp Simulator</h1>
      </header>

      <main class="workspace">
        <section class="detector-panel" aria-label="Detector view">
          <div id="scene-container"></div>
          <div id="event-display-container" class="view-hidden"></div>
        </section>

        <aside class="control-panel" aria-label="Control panel">
          <h2>Teacher Controls</h2>
          <div id="event-controls"></div>
          <div id="student-observables" class="readout-panel"></div>
          <div id="truth-readout" class="readout-panel truth-panel" hidden></div>
        </aside>
      </main>

      <footer class="status-panel" aria-label="Status panel">
        <strong>Status</strong>
        <span id="status-text">Scene ready</span>
      </footer>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
